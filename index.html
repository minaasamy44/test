<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Happy Birthday Jessie 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --plum: #3b0764;
    --violet: #7c3aed;
    --lavender: #c4b5fd;
    --rose: #f472b6;
    --cream: #fdf4ff;
    --glow: rgba(196, 181, 253, 0.35);
  }

  html, body {
    width: 100%;
    min-height: 100%;
    overflow-x: hidden;
    background: #0d0014;
    color: white;
    font-family: 'Tajawal', sans-serif;
  }

  /* ── شاشة البداية ── */
  .start-screen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 60%, #1e003a 0%, #000 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 30px;
    z-index: 100;
    transition: opacity 0.8s ease, visibility 0.8s;
  }
  .start-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .start-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 8vw, 52px);
    letter-spacing: 2px;
    background: linear-gradient(135deg, #e9d5ff, #f9a8d4, #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-align: center;
    padding: 0 20px;
    animation: shimmer 3s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    from { filter: brightness(1); }
    to   { filter: brightness(1.3); }
  }

  .start-subtitle {
    font-size: clamp(14px, 4vw, 18px);
    color: var(--lavender);
    opacity: 0.7;
    letter-spacing: 1px;
  }

  .start-btn {
    margin-top: 10px;
    padding: 18px 44px;
    font-size: clamp(16px, 4.5vw, 20px);
    font-family: 'Tajawal', sans-serif;
    font-weight: 700;
    background: linear-gradient(135deg, var(--violet), #9333ea);
    border: none;
    border-radius: 50px;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 30px rgba(124, 58, 237, 0.6), 0 0 60px rgba(124, 58, 237, 0.2);
    position: relative;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    border-radius: inherit;
  }
  .start-btn:active { transform: scale(0.96); box-shadow: 0 0 15px rgba(124,58,237,0.5); }

  /* نجوم متلألئة في الخلفية */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    0%   { opacity: 0; transform: scale(0.5); }
    100% { opacity: var(--max-op); transform: scale(1); }
  }

  /* ── خلفية الصور المتبادلة ── */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }
  .bg-layer img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: blur(18px) saturate(1.4);
    opacity: 0;
    transition: opacity 2.5s ease;
    transform: scale(1.08);
  }
  .bg-layer img.active { opacity: 0.25; }

  /* طبقة لون فوق الصور */
  .bg-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    background: radial-gradient(ellipse at 30% 40%, rgba(59,7,100,0.7) 0%, rgba(0,0,0,0.85) 100%);
    pointer-events: none;
  }

  /* ── المحتوى الرئيسي ── */
  .content {
    position: relative;
    z-index: 1;
    padding: 0 0 80px;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 1.2s ease, transform 1.2s ease;
  }
  .content.show { opacity: 1; transform: translateY(0); }

  /* هيدر */
  .hero {
    min-height: 100svh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    text-align: center;
    gap: 20px;
  }

  .hero-emoji {
    font-size: clamp(40px, 12vw, 72px);
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-12px); }
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 10vw, 72px);
    line-height: 1.1;
    background: linear-gradient(135deg, #e9d5ff 0%, #f9a8d4 50%, #c4b5fd 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
  }

  .hero-date {
    font-size: clamp(12px, 3.5vw, 16px);
    color: var(--lavender);
    letter-spacing: 3px;
    text-transform: uppercase;
    opacity: 0.6;
  }

  /* بطاقة الرسالة */
  .card {
    margin: 0 20px 48px;
    background: rgba(80, 0, 120, 0.35);
    border: 1px solid rgba(196, 181, 253, 0.2);
    border-radius: 24px;
    padding: clamp(24px, 6vw, 44px);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 8px 40px rgba(124,58,237,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    max-width: 540px;
    margin-inline: auto;
    margin-inline: 20px;
  }
  @media (min-width: 580px) { .card { margin: 0 auto 48px; } }

  .card-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rose);
    margin-bottom: 16px;
    opacity: 0.8;
  }

  .typed-text {
    font-size: clamp(15px, 4.2vw, 19px);
    line-height: 1.9;
    color: #f3e8ff;
    font-weight: 300;
    min-height: 80px;
  }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--rose);
    margin-right: 2px;
    vertical-align: text-bottom;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* قسم الفيديوهات */
  .section {
    padding: 0 20px;
    max-width: 600px;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 6vw, 30px);
    color: var(--lavender);
    margin-bottom: 24px;
    text-align: center;
  }

  .video-wrap {
    position: relative;
    margin-bottom: 24px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(196,181,253,0.15);
  }
  .video-wrap video {
    width: 100%;
    display: block;
    border-radius: 20px;
  }

  /* جسيمات القلوب */
  .particles-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    bottom: -40px;
    font-size: clamp(14px, 3vw, 22px);
    animation: rise linear forwards;
    opacity: 0.7;
  }
  @keyframes rise {
    0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.7; }
    100% { transform: translateY(-110vh) rotate(360deg) scale(0.4); opacity: 0; }
  }

  /* قسم تغيير الصور (مؤشر دوت) */
  .bg-dots {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 5;
  }
  .bg-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(196,181,253,0.35);
    transition: background 0.4s, transform 0.4s;
  }
  .bg-dot.on { background: var(--lavender); transform: scale(1.4); }

  /* divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--lavender), transparent);
    margin: 0 auto 48px;
  }
</style>
</head>
<body>

<!-- نجوم -->
<div class="stars" id="stars"></div>

<!-- شاشة البداية -->
<div class="start-screen" id="startScreen">
  <p class="start-title">Happy Birthday<br>Jessie 💜</p>
  <p class="start-subtitle">لحظة مميزة بتستنيكِ</p>
  <button class="start-btn" onclick="startExperience()">دوسي هنا 🎁</button>
</div>

<!-- موسيقى -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- خلفية الصور -->
<div class="bg-layer" id="bgLayer">
  <img src="photo1.jpg" class="active" alt="">
  <img src="photo2.jpg" alt="">
  <img src="photo3.jpg" alt="">
  <img src="photo4.jpg" alt="">
</div>
<div class="bg-overlay"></div>

<!-- جسيمات -->
<div class="particles-container" id="particles"></div>

<!-- المحتوى -->
<div class="content" id="mainContent">

  <section class="hero">
    <div class="hero-emoji">🎂</div>
    <h1 class="hero-title">Happy Birthday<br>Jessie</h1>
    <p class="hero-date">✨ يوم مميز زيّكِ ✨</p>
  </section>

  <div class="card">
    <p class="card-label">رسالتي ليكِ</p>
    <p class="typed-text" id="typedText"><span class="cursor"></span></p>
  </div>

  <div class="divider"></div>

  <section class="section">
    <h2 class="section-title">ذكرياتنا 🎥</h2>
    <div class="video-wrap">
      <video controls playsinline preload="metadata">
        <source src="video1.mp4" type="video/mp4">
      </video>
    </div>
    <div class="video-wrap">
      <video controls playsinline preload="metadata">
        <source src="video2.mp4" type="video/mp4">
      </video>
    </div>
  </section>

</div>

<!-- مؤشر الصور -->
<div class="bg-dots" id="bgDots"></div>

<script>
  // ── نجوم ──
  (function() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 90; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2.5 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%;
        left:${Math.random()*100}%;
        --dur:${2 + Math.random()*4}s;
        --max-op:${0.3 + Math.random()*0.7};
        animation-delay:${Math.random()*5}s;
      `;
      c.appendChild(s);
    }
  })();

  // ── خلفية صور ──
  const bgImgs = document.querySelectorAll('.bg-layer img');
  const dotsWrap = document.getElementById('bgDots');
  let bgIdx = 0;

  bgImgs.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'bg-dot' + (i === 0 ? ' on' : '');
    dotsWrap.appendChild(d);
  });
  const dots = dotsWrap.querySelectorAll('.bg-dot');

  function nextBg() {
    bgImgs[bgIdx].classList.remove('active');
    dots[bgIdx].classList.remove('on');
    bgIdx = (bgIdx + 1) % bgImgs.length;
    bgImgs[bgIdx].classList.add('active');
    dots[bgIdx].classList.add('on');
  }
  setInterval(nextBg, 5000);

  // ── كتابة تدريجية ──
  const msg = "كل سنة وانتِ أجمل حاجة في حياتي 💜 وجودك فرّق معايا في كل حاجة... وأنا محظوظ إنك معايا دايمًا 🌸";
  let charIdx = 0;
  const textEl = document.getElementById('typedText');

  function typeWriter() {
    if (charIdx < msg.length) {
      textEl.innerHTML = msg.slice(0, charIdx + 1) + '<span class="cursor"></span>';
      charIdx++;
      setTimeout(typeWriter, 55);
    }
  }

  // ── جسيمات قلوب ──
  const emojis = ['💜','🌸','✨','💫','🎀','🌷','💖'];
  function spawnParticle() {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    const dur = 5 + Math.random() * 6;
    p.style.cssText = `
      left: ${Math.random()*100}%;
      font-size: ${14 + Math.random()*14}px;
      animation-duration: ${dur}s;
      animation-delay: ${Math.random()*2}s;
    `;
    document.getElementById('particles').appendChild(p);
    setTimeout(() => p.remove(), (dur + 2) * 1000);
  }

  let particleInterval;

  // ── بدء التجربة ──
  function startExperience() {
    document.getElementById('startScreen').classList.add('hidden');
    document.getElementById('music').play().catch(() => {});
    const content = document.getElementById('mainContent');
    content.classList.add('show');

    setTimeout(typeWriter, 800);

    particleInterval = setInterval(spawnParticle, 1800);
    for (let i = 0; i < 5; i++) setTimeout(spawnParticle, i * 300);
  }
</script>
</body>
</html>
